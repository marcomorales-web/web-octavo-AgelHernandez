<section class="services-page inventory-page">

  <!-- HEADER -->
  <div class="services-header">
    <div>
      <h2>Inventario</h2>
      <p class="subtitle">
        Control y gestión de refacciones y suministros
      </p>
    </div>

    <button class="btn-primary">
      + Agregar Producto
    </button>
  </div>

  <!-- cards principales -->
  
  <div class="inventario-stats">
    <div class="card blue">
      <div class="icon"><img src="/icons8-box-26.png" /></div>
      <p>Total de productos</p>
      
    </div>

    <div class="card red">
      <div class="icon"><img src="/icons8-danger-24.png" /></div>
      <p>Stock Bajo</p>
      
    </div>

    <div class="card green">
      <div class="icon"><img src="/icons8-$-24.png" /></div>
      <p>Valor de productos</p>
     
    </div>
  </div>
  

    <!-- tabla -->
  <h3 class="mt-4">Lista de Productos</h3>

  <div class="inventory-container">

  <h2>Inventario</h2>

  <table mat-table [dataSource]="inventario" class="mat-elevation-z8">

    <!-- ID -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef> ID </th>
      <td mat-cell *matCellDef="let item"> {{item.id}} </td>
    </ng-container>

    <!-- Nombre -->
    <ng-container matColumnDef="nombre">
      <th mat-header-cell *matHeaderCellDef> Producto </th>
      <td mat-cell *matCellDef="let item"> {{item.nombre}} </td>
    </ng-container>

    <!-- Cantidad -->
    <ng-container matColumnDef="cantidad">
      <th mat-header-cell *matHeaderCellDef> Cantidad </th>
      <td mat-cell *matCellDef="let item"> {{item.cantidad}} </td>
    </ng-container>

    <!-- Precio -->
    <ng-container matColumnDef="precio">
      <th mat-header-cell *matHeaderCellDef> Precio </th>
      <td mat-cell *matCellDef="let item"> ${{item.precio}} </td>
    </ng-container>

    <!-- Acciones -->
    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef> Acciones </th>
      <td mat-cell *matCellDef="let item">

        <button mat-icon-button >
          <mat-icon>edit</mat-icon>
        </button>

        <button mat-icon-button >
          <mat-icon>delete</mat-icon>
        </button>

      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columnas"></tr>

    <tr mat-row *matRowDef="let row; columns: columnas;"></tr>

  </table>

</div>

</section>
