<div class="container">
  <h3 class="sub-title">Reporte de Daños</h3>

  @if (enviado()) {
    <div class="alert-success">Reporte enviado. Un técnico revisará tu caso pronto.</div>
  }

  <div class="form-card">

    <div class="form-group">
      <label>Vehículo</label>
      <select [(ngModel)]="form.vehiculoId">
        <option value="">Selecciona tu vehículo</option>
        @for (v of vehiculos(); track v.id) {
          <option [value]="v.id">{{ v.make }} {{ v.model }} {{ v.year }}</option>
        }
      </select>
    </div>

    <div class="form-group">
      <label>Zona afectada</label>
      <div class="chips">
        @for (z of zonas; track z) {
          <span class="chip" [class.active]="form.zona === z" (click)="form.zona = z">{{ z }}</span>
        }
      </div>
    </div>

    <!-- ── Upload zone real con drag and drop ── -->
    <div class="form-group">
      <label>Fotos del daño</label>

      <label class="upload-zone" [class.dragging]="dragging()"
             (dragover)="onDragOver($event)" (dragleave)="onDragLeave()"
             (drop)="onDrop($event)" for="file-input">
        <div class="upload-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </div>
        <p class="upload-text">Arrastra fotos aquí o <span>haz clic para subir</span></p>
        <p class="upload-hint">JPG, PNG, WEBP · máx 10 MB cada una</p>
        <input id="file-input" type="file" accept="image/*" multiple
               style="display:none" (change)="onFileChange($event)" />
      </label>

      <!-- Preview de imágenes seleccionadas -->
      @if (imagenes().length > 0) {
        <div class="preview-grid">
          @for (img of imagenes(); track img.nombre; let i = $index) {
            <div class="preview-item">
              <img [src]="img.url" [alt]="img.nombre" class="preview-img" />
              <button class="preview-remove" (click)="eliminarImagen(i)" type="button">✕</button>
              <span class="preview-name">{{ img.nombre.length > 14 ? img.nombre.slice(0,12)+'...' : img.nombre }}</span>
            </div>
          }
        </div>
      }
    </div>

    <div class="form-group">
      <label>Descripción de los daños</label>
      <textarea [(ngModel)]="form.descripcion" rows="4"
                placeholder="Ubica y describe cada daño observado. Incluye cuándo comenzó el problema."></textarea>
    </div>

    <div class="form-footer">
      <button class="btn-primary" (click)="enviar()" [disabled]="!valido()">
        Enviar Reporte
      </button>
    </div>
  </div>
</div>
