<div class="container">
  <h3 class="sub-title">Reporte de Daños</h3>

  @if (enviado()) {
    <div class="alert-success"> Reporte enviado. Un técnico revisará tu caso pronto.</div>
  }

  <div class="form-card">
    <div class="form-group">
      <label>Vehículo</label>
      <select [(ngModel)]="form.vehiculoId">
        <option value="">Selecciona tu vehículo</option>
        @for (v of vehiculos(); track v.id) {
          <option [value]="v.id">{{ v.make }} {{ v.model }} {{ v.year }}</option>
        }
      </select>
    </div>
    <div class="form-group">
      <label>Zona afectada</label>
      <div class="chips">
        @for (z of zonas; track z) {
          <span class="chip" [class.active]="form.zona === z" (click)="form.zona = z">{{ z }}</span>
        }
      </div>
    </div>
    <div class="upload-zone">
      <div style="font-size:28px;margin-bottom:8px">(camera)</div>
      <p>Arrastra fotos o haz clic para subir</p>
      <span>JPG, PNG hasta 10MB cada una</span>
    </div>
    <div class="form-group">
      <label>Descripción de los daños</label>
      <textarea [(ngModel)]="form.descripcion" rows="4"
                placeholder="Ubica y describe cada daño observado. Incluye cuándo comenzó el problema."></textarea>
    </div>
    <div class="form-footer">
      <button class="btn-primary" (click)="enviar()" [disabled]="!valido()">Enviar Reporte</button>
    </div>
  </div>
</div>
