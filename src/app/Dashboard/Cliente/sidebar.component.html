<div class="sidebar">

  <div class="sidebar-brand">
    <img src="/jirafitas_ico.ico" class="brand-ico" alt="logo" />
    <div>
      <div class="brand-name">Jirafita's</div>
      <div class="brand-sub">Garage</div>
    </div>
  </div>

  <div class="user-pill">
    <div class="user-avatar">{{ nombre()[0] }}</div>
    <div class="user-name">{{ nombre() }}</div>
  </div>

  <nav class="sidebar-nav">
    <a class="nav-link" routerLink="/dashboard"
       routerLinkActive="nav-active" [routerLinkActiveOptions]="{exact:true}">
      <img src="/car.png" class="nav-ico" alt="" />
      <span>Mis Vehículos</span>
    </a>

    <a class="nav-link" routerLink="/dashboard/Servicios" routerLinkActive="nav-active">
      <img src="/icons8-calendar-24.png" class="nav-ico" alt="" />
      <span>Servicios</span>
    </a>

    <a class="nav-link" routerLink="/dashboard/Seguimiento" routerLinkActive="nav-active">
      <img src="/icons8-wrench-24.png" class="nav-ico" alt="" />
      <span>Seguimiento</span>
    </a>
  </nav>

  <div class="sidebar-footer">
    <button class="btn-logout" (click)="cerrarSesion()">Cerrar sesión</button>
  </div>

</div>
