<div class="form-container animate__animated animate__fadeInDown">
  <h1 class="animate__animated animate__bounce">RECUPERAR CONTRASEÑA</h1>
  <img src="/logo2.png" class="logo animate__animated animate__backInLeft" alt="Jirafitas" />

  @if (enviado()) {
    <div class="alert-success animate__animated animate__fadeIn">
      Solicitud enviada. Revisa tu correo en los próximos minutos.
    </div>
    <button (click)="goLogin()" style="margin-top: 12px">Volver al login</button>
  } @else {
    @if (error()) {
      <p class="error-msg animate__animated animate__shakeX">{{ error() }}</p>
    }

    <div class="input-group animate__animated animate__backInLeft">
      <label>Nombre completo</label>
      <input [(ngModel)]="form.nombre" type="text" placeholder="Tu nombre" />
    </div>

    <div class="input-group animate__animated animate__backInLeft">
      <img src="/icons8-gmail-32.png" class="icon-input" alt="" />
      <label>Correo registrado</label>
      <input [(ngModel)]="form.correo" type="email" placeholder="ejemplo@gmail.com" />
    </div>

    <div class="input-group animate__animated animate__backInLeft">
      <img src="/icons8-phone-50.png" class="icon-input" alt="" />
      <label>Teléfono (opcional)</label>
      <input [(ngModel)]="form.telefono" type="tel" placeholder="777 000 0000" />
    </div>

    <button class="animate__animated animate__fadeIn" (click)="enviar()">Enviar solicitud</button>

    <div class="footer animate__animated animate__backInUp" style="margin-top: 14px">
      ¿Ya tienes cuenta?
      <a (click)="goLogin()">Iniciar sesión</a>
    </div>
  }
</div>
